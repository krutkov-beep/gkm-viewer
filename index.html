<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GKM Viewer — Hausel Group</title>
<style>
  :root { --bg:#0f1115; --panel:#181b22; --ink:#e6e8ec; --muted:#9aa3b2; --accent:#4f9cff; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  body { display:flex; flex-direction:column; }
  header { padding:14px 18px 0; }
  h1 { margin:0 0 2px; font-size:20px; font-weight:600; }
  p.sub { margin:0 0 10px; color:var(--muted); font-size:13px; }
  .tabs { display:flex; gap:6px; border-bottom:1px solid #2a2f3a; padding:0 6px; }
  .tab { appearance:none; border:0; background:transparent; color:var(--muted);
    padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer;
    border-bottom:2px solid transparent; border-radius:6px 6px 0 0; }
  .tab:hover { color:var(--ink); background:var(--panel); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .stage { position:relative; flex:1 1 auto; min-height:0; background:var(--panel); }
  iframe { position:absolute; inset:0; width:100%; height:100%; border:0; background:#fff; display:none; }
  iframe.active { display:block; }
</style>
</head>
<body>
<header>
  <h1>GKM Viewer</h1>
  <p class="sub">Interactive GKM graphs for the rank-2 root systems. Drag to rotate · scroll to zoom · right-drag to pan.</p>
</header>
<nav class="tabs" role="tablist">
  <button class="tab active" data-target="a2" role="tab" aria-selected="true">A2</button>
  <button class="tab" data-target="b2" role="tab" aria-selected="false">B2</button>
  <button class="tab" data-target="g2" role="tab" aria-selected="false">G2</button>
</nav>
<div class="stage">
  <iframe id="a2" class="active" title="A2 GKM graph" src="a2.html"></iframe>
  <iframe id="b2" title="B2 GKM graph" data-src="b2.html"></iframe>
  <iframe id="g2" title="G2 GKM graph" data-src="g2.html"></iframe>
</div>
<script>
  const tabs = document.querySelectorAll('.tab');
  const frames = { a2:a2, b2:b2, g2:g2 };
  tabs.forEach(t => t.addEventListener('click', () => {
    const id = t.dataset.target, f = frames[id];
    if (f.dataset.src) { f.src = f.dataset.src; delete f.dataset.src; }   // lazy-load on first view
    tabs.forEach(x => { const on = x === t; x.classList.toggle('active', on); x.setAttribute('aria-selected', on); });
    Object.values(frames).forEach(fr => fr.classList.toggle('active', fr === f));
  }));
</script>
</body>
</html>
